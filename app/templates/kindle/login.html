<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Acceso</title>
    <style>
        body {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 18px;
            color: #000;
            background: #fff;
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
        }

        .outer {
            display: table;
            width: 100%;
            min-height: 100vh;
        }

        .middle {
            display: table-cell;
            vertical-align: middle;
            text-align: center;
            padding: 16px;
        }

        .card {
            display: inline-block;
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        h2 {
            font-size: 1.3em;
            margin-bottom: 1.5em;
            font-weight: normal;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 10px;
            font-size: 22px;
            font-family: Georgia, serif;
            border: 2px solid #000;
            background: #fff;
            color: #000;
            text-align: center;
            letter-spacing: 0.15em;
            box-sizing: border-box;
            -webkit-appearance: none;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #000;
        }

        button {
            display: block;
            width: 100%;
            margin-top: 16px;
            padding: 14px;
            font-size: 18px;
            font-family: Georgia, serif;
            background: #000;
            color: #fff;
            border: none;
            cursor: pointer;
        }

        .error {
            margin-top: 14px;
            font-size: 0.9em;
            color: #000;
            border: 1px solid #000;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="outer">
    <div class="middle">
    <div class="card">
        <h2>Introduce el código</h2>
        <form method="POST" action="/kindle/login" id="loginForm">
            <input type="hidden" name="next" value="{{ next }}">
            <input
                type="text"
                name="pin"
                id="pinInput"
                placeholder="····"
                autocomplete="off"
                autocorrect="off"
                autocapitalize="off"
                spellcheck="false"
                autofocus
            >
            <button type="submit" id="submitBtn">Entrar</button>
        </form>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
    </div>
    </div>
    </div>

    <script>
        var form = document.getElementById('loginForm');
        var input = document.getElementById('pinInput');
        var btn = document.getElementById('submitBtn');

        form.addEventListener('submit', function(e) {
            var val = input.value.trim();
            if (!val) {
                e.preventDefault();
                input.style.borderColor = '#000';
                input.focus();
                return;
            }
            btn.disabled = true;
            btn.textContent = '...';
        });

        input.addEventListener('input', function() {
            input.style.borderColor = '#000';
        });
    </script>
</body>
</html>
