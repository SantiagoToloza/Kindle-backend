<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kindle Reader</title>
<style>
body { font-family: Georgia, serif; font-size: 18px; line-height: 1.6; color: #000; background: #fff; max-width: 680px; margin: 0 auto; padding: 20px 16px; }
h1 { font-size: 1.3em; margin-bottom: 0.3em; }
hr { border: none; border-top: 1px solid #ccc; margin: 0.8em 0; }
a, a:link, a:visited { color: #000; text-decoration: none; border-bottom: 1px solid #999; }
small { font-size: 0.78em; color: #555; }
p { margin: 0.6em 0; }
</style>
</head>
<body>
<h1>Kindle Reader</h1>
<p>{{ articles|length }} articulo(s) por leer</p>
<hr>
{% if articles %}
{% for article in articles %}
<p>
<a href="/kindle/{{ article.id }}">{{ article.title }}</a><br>
<small>{{ article.site_name or (article.url | urlhost) }} - {{ article.created_at | datetimeformat }}</small>
</p>
<hr>
{% endfor %}
{% else %}
<p>No hay articulos pendientes.</p>
{% endif %}
</body>
</html>
