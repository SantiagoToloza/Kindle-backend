<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ article.title }}</title>
    <style>
        body {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 18px;
            line-height: 1.7;
            color: #000;
            background: #fff;
            max-width: 680px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        .nav {
            font-size: 0.85em;
            margin-bottom: 1.5em;
        }

        .nav a,
        .nav a:link,
        .nav a:visited {
            color: #333;
            text-decoration: none;
            border-bottom: 1px solid #999;
            padding-bottom: 1px;
        }

        h1 {
            font-size: 1.5em;
            line-height: 1.3;
            margin-bottom: 0.4em;
        }

        .meta {
            font-size: 0.82em;
            color: #666;
            margin-bottom: 0.3em;
        }

        hr {
            border: none;
            border-top: 1px solid #ccc;
            margin: 1.2em 0;
        }

        .content {
            margin-top: 0.5em;
        }

        .content h1,
        .content h2 {
            font-size: 1.2em;
            line-height: 1.3;
            margin: 1.2em 0 0.4em;
        }

        .content h3 {
            font-size: 1em;
            line-height: 1.3;
            margin: 1em 0 0.3em;
        }

        .content p {
            margin-bottom: 1.2em;
        }

        .content a,
        .content a:link,
        .content a:visited {
            color: #000;
        }

        .content blockquote {
            margin: 1em 0 1em 1.5em;
            padding-left: 1em;
            border-left: 3px solid #ccc;
            color: #333;
        }

        .content pre,
        .content code {
            font-family: monospace;
            font-size: 0.88em;
            background: #f5f5f5;
            padding: 2px 4px;
        }

        .content pre {
            padding: 12px;
            overflow-x: auto;
            border: 1px solid #ddd;
        }

        .content ul,
        .content ol {
            margin: 0.5em 0 1em 1.5em;
        }

        .content li {
            margin-bottom: 0.4em;
        }

        .read-section {
            margin-top: 2.5em;
            padding-top: 1.5em;
            border-top: 2px solid #000;
            text-align: center;
        }

        .btn-read {
            display: inline-block;
            padding: 14px 32px;
            background: #000;
            color: #fff;
            font-family: Georgia, serif;
            font-size: 1em;
            border: none;
            cursor: pointer;
        }

        .read-badge {
            display: inline-block;
            padding: 10px 24px;
            border: 2px solid #999;
            color: #666;
            font-size: 0.9em;
        }

        .back-link,
        .back-link:link,
        .back-link:visited {
            display: block;
            margin-top: 1.5em;
            font-size: 0.85em;
            color: #333;
            text-decoration: none;
            border-bottom: 1px solid #999;
            padding-bottom: 1px;
            text-align: center;
        }
    </style>
</head>
<body>
    <p class="nav"><a href="/kindle">&larr; Volver a la lista</a></p>

    <h1>{{ article.title }}</h1>

    <p class="meta">
        {{ article.site_name or (article.url | urlhost) }}
        {% if article.author %} &middot; {{ article.author }}{% endif %}
        &middot; {{ article.created_at | datetimeformat }}
    </p>

    <hr>

    <div class="content">
        {{ content_html | safe }}
    </div>

    <div class="read-section">
        {% if article.is_read %}
            <span class="read-badge">Ya leido</span>
        {% else %}
            <form method="post" action="/kindle/{{ article.id }}/read">
                <button class="btn-read" type="submit">Marcar como leido</button>
            </form>
        {% endif %}
        <a class="back-link" href="/kindle">&larr; Volver a la lista</a>
    </div>
</body>
</html>
