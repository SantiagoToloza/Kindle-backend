<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ article.title }}</title>
    <style>
        body {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 18px;
            line-height: 1.7;
            color: #000;
            background: #fff;
            max-width: 680px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        .nav {
            font-size: 0.85em;
            margin-bottom: 1.5em;
        }

        .nav a {
            color: #333;
            text-decoration: none;
            border-bottom: 1px solid #999;
            padding-bottom: 1px;
        }

        h1 {
            font-size: 1.5em;
            line-height: 1.3;
            margin-bottom: 0.4em;
        }

        .meta {
            font-size: 0.82em;
            color: #666;
            margin-bottom: 0.3em;
        }

        hr {
            border: none;
            border-top: 1px solid #ccc;
            margin: 1.2em 0;
        }

        .content {
            margin-top: 0.5em;
        }

        .content h1,
        .content h2 {
            font-size: 1.2em;
            line-height: 1.3;
            margin: 1.2em 0 0.4em;
        }

        .content h3 {
            font-size: 1em;
            line-height: 1.3;
            margin: 1em 0 0.3em;
        }

        .content p {
            margin-bottom: 1.2em;
        }

        .content a {
            color: #000;
        }

        .content blockquote {
            margin: 1em 0 1em 1.5em;
            padding-left: 1em;
            border-left: 3px solid #ccc;
            color: #333;
        }

        .content pre,
        .content code {
            font-family: monospace;
            font-size: 0.88em;
            background: #f5f5f5;
            padding: 2px 4px;
        }

        .content pre {
            padding: 12px;
            overflow-x: auto;
            border: 1px solid #ddd;
        }

        .content ul,
        .content ol {
            margin: 0.5em 0 1em 1.5em;
        }

        .content li {
            margin-bottom: 0.4em;
        }

        .read-section {
            margin-top: 2.5em;
            padding-top: 1.5em;
            border-top: 2px solid #000;
            text-align: center;
        }

        .btn-read {
            display: inline-block;
            padding: 14px 32px;
            background: #000;
            color: #fff;
            font-family: Georgia, serif;
            font-size: 1em;
            border: none;
            cursor: pointer;
        }

        .read-badge {
            display: inline-block;
            padding: 10px 24px;
            border: 2px solid #999;
            color: #666;
            font-size: 0.9em;
        }

        .back-link {
            display: block;
            margin-top: 1.5em;
            font-size: 0.85em;
            color: #333;
            text-decoration: none;
            border-bottom: 1px solid #999;
            padding-bottom: 1px;
            text-align: center;
        }

        /* Paginacion tipo EPUB */
        html, body {
            overflow: hidden;
            scrollbar-width: none;
        }
        html::-webkit-scrollbar {
            display: none;
        }
        body {
            padding-bottom: 36px;
        }
        #pg {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.75em;
            color: #999;
            background: #fff;
            padding: 6px 0 4px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <p class="nav"><a href="/kindle">&larr; Volver a la lista</a></p>

    <h1>{{ article.title }}</h1>

    <p class="meta">
        {{ article.site_name or (article.url | urlhost) }}
        {% if article.author %} &middot; {{ article.author }}{% endif %}
        &middot; {{ article.created_at | datetimeformat }}
    </p>

    <hr>

    <div class="content">
        {{ content_html | safe }}
    </div>

    <div class="read-section">
        {% if article.is_read %}
            <span class="read-badge">Ya leido</span>
        {% else %}
            <form method="post" action="/kindle/{{ article.id }}/read">
                <button class="btn-read" type="submit">Marcar como leido</button>
            </form>
        {% endif %}
        <a class="back-link" href="/kindle">&larr; Volver a la lista</a>
    </div>
    <div id="pg"></div>

    <script>
        var vh = window.innerHeight;
        var currentPage = 0;

        function totalPages() {
            return Math.ceil(document.body.scrollHeight / vh);
        }

        function goToPage(n) {
            var total = totalPages();
            currentPage = Math.max(0, Math.min(n, total - 1));
            window.scrollTo({ top: currentPage * vh, behavior: 'instant' });
            document.getElementById('pg').textContent = (currentPage + 1) + ' / ' + total;
        }

        document.addEventListener('click', function(e) {
            var tag = e.target.tagName.toLowerCase();
            if (tag === 'a' || tag === 'button' || tag === 'input' || tag === 'label') return;

            var x = e.clientX;
            var w = window.innerWidth;

            if (x < w * 0.3) {
                goToPage(currentPage - 1);
            } else if (x > w * 0.7) {
                goToPage(currentPage + 1);
            }
        });

        goToPage(0);
    </script>
</body>
</html>
