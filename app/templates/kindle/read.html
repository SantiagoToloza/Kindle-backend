<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ article.title }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            overflow: hidden;
            height: 100%;
            width: 100%;
        }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 18px;
            line-height: 1.7;
            color: #000;
            background: #fff;
        }

        /* ── Paginated viewport ── */
        #reader {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 40px;          /* espacio para el footer */
            overflow: hidden;
        }

        #columns {
            height: 100%;
            padding: 20px 24px;

            /* CSS Columns: cada columna = 1 página */
            column-fill: auto;
            column-gap: 48px;      /* gap entre "páginas" (no se ve, pero evita overlap) */
            column-width: 100vw;   /* se sobreescribe con JS */

            /* Desplazamiento horizontal controlado por JS */
            transform: translateX(0);
            transition: transform 0.25s ease;
        }

        /* Evitar que elementos se corten entre páginas */
        #columns h1,
        #columns h2,
        #columns h3,
        #columns p,
        #columns li,
        #columns blockquote,
        #columns pre,
        #columns .read-section {
            break-inside: avoid;
        }

        /* Que los headings no queden solos al final de una página */
        #columns h1,
        #columns h2,
        #columns h3 {
            break-after: avoid;
        }

        /* ── Typography ── */
        .nav {
            font-size: 0.85em;
            margin-bottom: 1.5em;
        }

        .nav a,
        .nav a:link,
        .nav a:visited {
            color: #333;
            text-decoration: none;
            border-bottom: 1px solid #999;
            padding-bottom: 1px;
        }

        .article-title {
            font-size: 1.5em;
            line-height: 1.3;
            margin-bottom: 0.4em;
        }

        .meta {
            font-size: 0.82em;
            color: #666;
            margin-bottom: 0.3em;
        }

        hr {
            border: none;
            border-top: 1px solid #ccc;
            margin: 1.2em 0;
        }

        .content h1,
        .content h2 {
            font-size: 1.2em;
            line-height: 1.3;
            margin: 1.2em 0 0.4em;
        }

        .content h3 {
            font-size: 1em;
            line-height: 1.3;
            margin: 1em 0 0.3em;
        }

        .content p {
            margin-bottom: 1.2em;
        }

        .content a,
        .content a:link,
        .content a:visited {
            color: #000;
        }

        .content blockquote {
            margin: 1em 0 1em 1.5em;
            padding-left: 1em;
            border-left: 3px solid #ccc;
            color: #333;
        }

        .content pre,
        .content code {
            font-family: monospace;
            font-size: 0.88em;
            background: #f5f5f5;
            padding: 2px 4px;
        }

        .content pre {
            padding: 12px;
            overflow-x: auto;
            border: 1px solid #ddd;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .content ul,
        .content ol {
            margin: 0.5em 0 1em 1.5em;
        }

        .content li {
            margin-bottom: 0.4em;
        }

        /* ── Read section ── */
        .read-section {
            margin-top: 2.5em;
            padding-top: 1.5em;
            border-top: 2px solid #000;
            text-align: center;
        }

        .btn-read {
            display: inline-block;
            padding: 14px 32px;
            background: #000;
            color: #fff;
            font-family: Georgia, serif;
            font-size: 1em;
            border: none;
            cursor: pointer;
        }

        .read-badge {
            display: inline-block;
            padding: 10px 24px;
            border: 2px solid #999;
            color: #666;
            font-size: 0.9em;
        }

        .back-link,
        .back-link:link,
        .back-link:visited {
            display: block;
            margin-top: 1.5em;
            font-size: 0.85em;
            color: #333;
            text-decoration: none;
            border-bottom: 1px solid #999;
            padding-bottom: 1px;
            text-align: center;
        }

        /* ── Footer / page indicator ── */
        #pg {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.75em;
            color: #999;
            background: #fff;
            padding: 8px 0 6px;
            border-top: 1px solid #eee;
            user-select: none;
        }

        /* ── Progress bar ── */
        #progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 2px;
            background: #000;
            width: 0%;
            transition: width 0.25s ease;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="progress"></div>

    <div id="reader">
        <div id="columns">
            <p class="nav"><a href="/kindle">&larr; Volver a la lista</a></p>

            <h1 class="article-title">{{ article.title }}</h1>

            <p class="meta">
                {{ article.site_name or (article.url | urlhost) }}
                {% if article.author %} &middot; {{ article.author }}{% endif %}
                &middot; {{ article.created_at | datetimeformat }}
            </p>

            <hr>

            <div class="content">
                {{ content_html | safe }}
            </div>

            <div class="read-section">
                {% if article.is_read %}
                    <span class="read-badge">Ya leído</span>
                {% else %}
                    <form method="post" action="/kindle/{{ article.id }}/read">
                        <button class="btn-read" type="submit">Marcar como leído</button>
                    </form>
                {% endif %}
                <a class="back-link" href="/kindle">&larr; Volver a la lista</a>
            </div>
        </div>
    </div>

    <div id="pg"></div>

    <script>
        (function () {
            var col     = document.getElementById('columns');
            var reader  = document.getElementById('reader');
            var pgEl    = document.getElementById('pg');
            var progEl  = document.getElementById('progress');
            var current = 0;
            var total   = 1;
            var pageW   = 0;  // ancho de una "página" (column + gap)

            function measure() {
                // El ancho de cada columna = ancho del reader
                var rw = reader.clientWidth;
                var gap = 48;

                // Seteamos column-width exacto al viewport del reader
                col.style.columnWidth = rw + 'px';

                // Ancho total del contenido columnarizado
                pageW = rw + gap;
                total = Math.max(1, Math.round(col.scrollWidth / pageW));

                // Si la pagina actual quedo fuera de rango, ajustar
                if (current >= total) current = total - 1;

                render();
            }

            function render() {
                col.style.transform = 'translateX(-' + (current * pageW) + 'px)';
                pgEl.textContent = (current + 1) + ' / ' + total;
                progEl.style.width = (((current + 1) / total) * 100) + '%';
            }

            function goTo(n) {
                current = Math.max(0, Math.min(n, total - 1));
                render();
            }

            // Click zones: izquierda 30% = atrás, derecha 30% = adelante
            document.addEventListener('click', function (e) {
                var tag = e.target.tagName.toLowerCase();
                if (tag === 'a' || tag === 'button' || tag === 'input' || tag === 'label') return;

                // No paginar si clickearon dentro de un form
                if (e.target.closest('form')) return;

                var x = e.clientX;
                var w = window.innerWidth;

                if (x < w * 0.3) {
                    goTo(current - 1);
                } else if (x > w * 0.7) {
                    goTo(current + 1);
                }
            });

            // Keyboard navigation
            document.addEventListener('keydown', function (e) {
                if (e.key === 'ArrowLeft' || e.key === 'ArrowUp' || e.key === 'PageUp') {
                    goTo(current - 1);
                    e.preventDefault();
                } else if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === 'PageDown') {
                    goTo(current + 1);
                    e.preventDefault();
                } else if (e.key === 'Home') {
                    goTo(0);
                    e.preventDefault();
                } else if (e.key === 'End') {
                    goTo(total - 1);
                    e.preventDefault();
                }
            });

            // Touch swipe support
            var touchStartX = 0;
            document.addEventListener('touchstart', function (e) {
                touchStartX = e.changedTouches[0].clientX;
            }, { passive: true });

            document.addEventListener('touchend', function (e) {
                var dx = e.changedTouches[0].clientX - touchStartX;
                if (Math.abs(dx) > 40) {
                    if (dx > 0) goTo(current - 1);   // swipe right = atrás
                    else goTo(current + 1);           // swipe left  = adelante
                }
            }, { passive: true });

            // Recalcular al cambiar tamaño
            window.addEventListener('resize', function () {
                measure();
            });

            // Init: esperar a que el layout esté listo
            // (imágenes pueden cambiar el alto, así que recalculamos)
            measure();
            window.addEventListener('load', function () {
                measure();
            });
        })();
    </script>
</body>
</html>
